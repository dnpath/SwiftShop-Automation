name: Self-Monitoring Playwright Regression Suite

on:
  # Allows you to trigger the tests manually from the GitHub UI Actions tab
  workflow_dispatch:
  
  # Automatically monitors your main app by checking in every hour (or adjust as needed)
  schedule:
    - cron: '0 9 * * 1' 

permissions:
  contents: write

jobs:
  monitor-and-test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Testing Code
        uses: actions/checkout@v4

      # 1. MONITOR: Poll the public GitHub API for SwiftShop's Pages status
      - name: Wait for Main App Deployment to be Ready 🌐
        run: |
          echo "Checking the latest GitHub Pages deployment status for SwiftShop..."
          
          # Replace 'dnpath' with your actual GitHub organization/username if different
          OWNER="dnpath"
          REPO="SwiftShop"
          
          MAX_ATTEMPTS=5
          SLEEP_DURATION=30
          
          for ((i=1; i<=MAX_ATTEMPTS; i++)); do
            # Fetch the latest Pages deployment state from GitHub's public API
            STATUS=$(curl -s "https://api.github.com/repos/$OWNER/$REPO/pages/deployments/latest" | jq -r '.status // "unknown"')
            
            echo "Attempt $i: Current deployment status is '$STATUS'"
            
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ SwiftShop live deployment is verified active and stable!"
              exit 0
            elif [ "$STATUS" = "FAIL" ]; then
              echo "❌ Main application build has failed on its side. Aborting test run."
              exit 1
            fi
            
            echo "Waiting $SLEEP_DURATION seconds for deployment to settle..."
            sleep $SLEEP_DURATION
          done
          
          echo "⚠️ Deployment monitoring timed out, but proceeding with regression checks anyway."

      # 2. EXECUTE: The rest of your framework execution proceeds normally
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Framework Dependencies
        run: npm install

      - name: Install Playwright Standalone System Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Regression Suite Against Live URL
        run: npx playwright test
        continue-on-error: true

      - name: Load Allure History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages-dir
        continue-on-error: true

      - name: Generate Allure Graphical Report with History Trends
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report Directly to Live GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
